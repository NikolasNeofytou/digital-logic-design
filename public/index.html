<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logic Design Helper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Logic Design Helper</h1>
  <div>
    <label for="expr">Boolean Expression:</label>
    <input type="text" id="expr" placeholder="e.g., A'B + AC">
    <button id="analyze">Analyze</button>
  </div>
  <div id="pad" class="pad">
    <button data-val="A">A</button>
    <button data-val="B">B</button>
    <button data-val="C">C</button>
    <button data-val="D">D</button>
    <button data-val="'">NOT</button>
    <button data-val="*">AND</button>
    <button data-val="+">OR</button>
    <button data-val="(">(</button>
    <button data-val=")">)</button>
    <button id="backspace">⌫</button>
    <button id="clear">Clear</button>
  </div>
  <pre id="steps"></pre>
  <div id="kmap"></div>
  <pre id="theorems"></pre>
  <script src="app.js"></script>
</body>
</html>
